name: iOS Release Build (No Signing)
on:
  workflow_dispatch: # Pozwala uruchomić budowanie ręcznie w zakładce Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        run: |
          # Tworzymy plik .env na maszynie wirtualnej
          echo "FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}" >> .env.development
          echo "FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}" >> .env.development
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.development
          echo "FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}" >> .env.development
          echo "FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}" >> .env.development
          echo "FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}" >> .env.development

          # Kluczowy krok dla iOS: wskazujemy, który plik ma być użyty
          echo ".env.development" > /tmp/envfile
        shell: bash

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Setup Ruby (for CocoaPods)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install Pods
        run: |
          export ENVFILE=.env.development
          cd ios
          pod install --repo-update # --repo-update, refresh Firebase source, don't use old firebase cache
        shell: bash

      - name: Build iOS App
        run: |
          export ENVFILE=.env.development
          xcodebuild -workspace ios/FinanceNavigator.xcworkspace \
            -scheme FinanceNavigator \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO
        shell: bash
        # Flagi CODE_SIGNING_ALLOWED=NO są kluczowe, by build nie wywalił się przez brak certyfikatów

      - name: Zip App Bundle
        run: |
          cd build/Build/Products/Release-iphoneos
          zip -r FinanceNavigator.app.zip FinanceNavigator.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/Build/Products/Release-iphoneos/FinanceNavigator.app.zip
